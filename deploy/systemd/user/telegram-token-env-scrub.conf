# Drop-in for ccbot-style user services.
# Install under:
#   ~/.config/systemd/user/<service>.service.d/telegram-token-env-scrub.conf
# for every Telegram bot controller service, including ccbot.service and
# imm_arena_bot.service.
#
# The bot token must come from the instance CCBOT_DIR/.env file. Scrub generic
# manager-level Telegram token variables so python-dotenv override=False cannot
# accidentally prefer a stale inherited token over the per-instance .env token.
[Service]
UnsetEnvironment=TELEGRAM_BOT_TOKEN TELEGRAM_TOKEN
